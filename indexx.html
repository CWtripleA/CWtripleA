<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWtripleA | Car Wash & Detailing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff0000;
            --dark: #000000;
            --grey: #1a1a1a;
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: white;
            line-height: 1.6;
        }

        /* HERO SECTION */
        header {
            height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?q=80&w=2000'); /* Imagen de respaldo */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        .logo-main { font-size: 3.5rem; font-weight: 900; letter-spacing: -1px; }
        .logo-main span { color: var(--primary); }

        /* INSTAGRAM FEED STYLE */
        .insta-section {
            padding: 60px 10%;
            max-width: 1200px;
            margin: auto;
        }

        .insta-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .insta-header i {
            font-size: 2.5rem;
            background: var(--insta-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid-insta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 10px;
        }

        .insta-card {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: var(--grey);
            border-radius: 8px;
        }

        .insta-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }

        .insta-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
        }

        .insta-card:hover .insta-overlay { opacity: 1; }
        .insta-card:hover img { transform: scale(1.1); }

        /* BOTONES */
        .btn-action {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            margin: 10px;
        }

        .btn-ws { background: #25D366; color: white; }
        .btn-insta { border: 2px solid white; color: white; }
        .btn-insta:hover { background: white; color: black; }

        /* CONTACTO */
        .footer-info {
            background: var(--grey);
            padding: 40px 20px;
            text-align: center;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: white;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-main">CW<span>tripleA</span></div>
        <p style="font-size: 1.2rem; margin-bottom: 25px;">Detailing Profesional & Car Wash</p>
        <div>
            <a href="https://wa.me/5218621152103" class="btn-action btn-ws">
                <i class="fab fa-whatsapp"></i> AGENDAR CITA
            </a>
            <a href="https://www.instagram.com/cw_triplea/" target="_blank" class="btn-action btn-insta">
                <i class="fab fa-instagram"></i> VER TRABAJOS
            </a>
        </div>
    </header>

    <section class="insta-section">
        <div class="insta-header">
            <i class="fab fa-instagram"></i>
            <div style="text-align: left;">
                <h2 style="margin:0;">Sigue nuestro trabajo</h2>
                <p style="margin:0; color:#888;">@cw_triplea en Instagram</p>
            </div>
        </div>

        <div class="grid-insta">
            <div class="insta-card">
                <img src="https://via.placeholder.com/600/1a1a1a/ffffff?text=Detallado+Exterior" alt="CWtripleA">
                <div class="insta-overlay"><i class="fab fa-instagram fa-2x"></i></div>
            </div>
            <div class="insta-card">
                <img src="https://via.placeholder.com/600/1a1a1a/ffffff?text=Limpieza+Interiores" alt="CWtripleA">
                <div class="insta-overlay"><i class="fab fa-instagram fa-2x"></i></div>
            </div>
            <div class="insta-card">
                <img src="https://via.placeholder.com/600/1a1a1a/ffffff?text=Acabado+Espejo" alt="CWtripleA">
                <div class="insta-overlay"><i class="fab fa-instagram fa-2x"></i></div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="https://www.instagram.com/cw_triplea/" target="_blank" style="color: #888; text-decoration: none;">
                Ver todas las publicaciones <i class="fas fa-external-link-alt"></i>
            </a>
        </div>
    </section>

    <footer class="footer-info">
        <h3><i class="fas fa-map-marker-alt" style="color:red"></i> Nuevo León, México</h3>
        <p>Calidad AAA en cada detalle automotriz.</p>
        <p style="font-size: 0.8rem; color: #555; margin-top: 20px;">© 2026 CWtripleA - Car Wash & Detailing Professional</p>
    </footer>

    <a href="https://wa.me/5218621152103" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
